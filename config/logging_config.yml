version: 1
disable_existing_loggers: false
formatters:
  standard: {format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"}
handlers:
  console: {class: logging.StreamHandler, level: INFO, formatter: standard}
  file: {class: logging.handlers.RotatingFileHandler, level: DEBUG, formatter: standard,
         filename: /var/log/retail_pipeline/pipeline.log, maxBytes: 10485760, backupCount: 5}
loggers:
  RetailProducer: {level: INFO, handlers: [console, file]}
  StreamingConsumer: {level: INFO, handlers: [console, file]}
  BronzeToSilver: {level: INFO, handlers: [console, file]}
  SilverToGold: {level: INFO, handlers: [console, file]}
root: {level: INFO, handlers: [console, file]}
