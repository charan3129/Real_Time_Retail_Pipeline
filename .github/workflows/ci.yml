name: Retail Pipeline CI
on:
  push: {branches: [main, develop]}
  pull_request: {branches: [main]}
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix: {python-version: ["3.10", "3.11"]}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python-version }}"}
      - run: pip install pytest flake8 numpy faker
      - run: flake8 kafka_producer/ tests/ --max-line-length=120 --ignore=E501,W503,E402
      - run: pytest tests/ -v --tb=short
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -c "import yaml,json,glob,sys; [yaml.safe_load(open(f)) for f in glob.glob('**/*.yml',recursive=True)]; [json.load(open(f)) for f in glob.glob('**/*.json',recursive=True)]; print('All configs valid')"
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.streamlit -t retail-streamlit:test .
      - run: docker compose config --quiet
