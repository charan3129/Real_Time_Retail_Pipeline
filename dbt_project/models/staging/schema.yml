version: 2
sources:
  - name: raw
    database: RETAIL_ANALYTICS
    schema: RAW
    tables:
      - name: transactions
        columns:
          - name: order_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: store_id
            tests: [not_null]
models:
  - name: stg_transactions
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null]
      - name: store_id
        tests: [not_null]
  - name: stg_products
    columns:
      - name: product_id
        tests: [not_null, unique]
  - name: stg_stores
    columns:
      - name: store_id
        tests: [not_null, unique]
