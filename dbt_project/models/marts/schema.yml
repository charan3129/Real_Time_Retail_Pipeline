version: 2
models:
  - name: fact_sales
    columns:
      - name: sale_key
        tests: [not_null, unique]
      - name: product_key
        tests: [not_null, {relationships: {to: ref('dim_product'), field: product_key}}]
      - name: store_key
        tests: [not_null, {relationships: {to: ref('dim_store'), field: store_key}}]
      - name: date_key
        tests: [not_null, {relationships: {to: ref('dim_date'), field: date_key}}]
  - name: dim_product
    columns:
      - name: product_key
        tests: [not_null, unique]
  - name: dim_store
    columns:
      - name: store_key
        tests: [not_null, unique]
  - name: dim_date
    columns:
      - name: date_key
        tests: [not_null, unique]
